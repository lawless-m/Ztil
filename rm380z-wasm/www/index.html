<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RM 380Z</title>
<style>
  body {
    background: #111;
    color: #0f0;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { color: #0a0; font-size: 18px; margin-bottom: 10px; }
  #display {
    position: relative;
    border: 2px solid #0a0;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    overflow: hidden;
  }
  #hrg-canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
  }
  #text-overlay {
    position: absolute;
    top: 0; left: 0;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    line-height: 1;
    white-space: pre;
    pointer-events: none;
    padding: 0;
    margin: 0;
  }
  #text-overlay .cursor {
    background: #0f0;
    color: #000;
  }
  #controls {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  button {
    background: #0a0;
    color: #000;
    border: none;
    padding: 8px 16px;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
  }
  button:hover { background: #0f0; }
  #status { color: #0a0; font-size: 12px; }
  input[type=file] { color: #0a0; font-size: 12px; }
</style>
</head>
<body>
<h1>Research Machines 380Z</h1>
<div id="display" tabindex="0">
  <canvas id="hrg-canvas" width="640" height="384"></canvas>
  <div id="text-overlay"></div>
</div>
<div id="controls">
  <button id="loadBtn">Load .COM</button>
  <input type="file" id="fileInput" accept=".com,.COM" style="display:none">
  <button id="hrgDemo">HRG Demo</button>
  <span id="status">Click display to type. Load a .COM file to run.</span>
</div>

<script type="module">
import init, { Emulator } from '../pkg/rm380z_wasm.js';

let emu = null;
let wasmMemory = null;

const display = document.getElementById('display');
const canvas = document.getElementById('hrg-canvas');
const ctx = canvas.getContext('2d');
const textOverlay = document.getElementById('text-overlay');
const status = document.getElementById('status');
const fileInput = document.getElementById('fileInput');
const loadBtn = document.getElementById('loadBtn');
const hrgDemoBtn = document.getElementById('hrgDemo');

// Canvas is 640x384 = 2x scale of 320x192
const SCALE = 2;
const HRG_W = 320;
const HRG_H = 192;

async function start() {
  const wasm = await init();
  wasmMemory = wasm.memory;
  emu = new Emulator();
  display.focus();
  runLoop();
}

function renderVDU() {
  if (!emu || !wasmMemory) return;
  const ptr = emu.vdu_ptr();
  const mem = new Uint8Array(wasmMemory.buffer, ptr, 960);
  const curRow = emu.cursor_row();
  const curCol = emu.cursor_col();

  let html = '';
  for (let row = 0; row < 24; row++) {
    for (let col = 0; col < 40; col++) {
      let ch = mem[row * 40 + col];
      if (ch < 32 || ch > 126) ch = 32;
      const c = String.fromCharCode(ch);
      if (row === curRow && col === curCol) {
        html += '<span class="cursor">' + escHtml(c) + '</span>';
      } else {
        html += escHtml(c);
      }
    }
    if (row < 23) html += '\n';
  }
  textOverlay.innerHTML = html;
}

function renderHRG() {
  if (!emu || !wasmMemory) return;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!emu.hrg_enabled()) return;

  const ptr = emu.hrg_ptr();
  const mem = new Uint8Array(wasmMemory.buffer, ptr, HRG_W / 8 * HRG_H);

  const imgData = ctx.createImageData(canvas.width, canvas.height);
  const pixels = imgData.data;

  for (let y = 0; y < HRG_H; y++) {
    for (let byteX = 0; byteX < HRG_W / 8; byteX++) {
      const byte = mem[y * (HRG_W / 8) + byteX];
      for (let bit = 0; bit < 8; bit++) {
        const on = (byte >> (7 - bit)) & 1;
        if (on) {
          const px = byteX * 8 + bit;
          // Draw scaled pixel
          for (let sy = 0; sy < SCALE; sy++) {
            for (let sx = 0; sx < SCALE; sx++) {
              const idx = ((y * SCALE + sy) * canvas.width + px * SCALE + sx) * 4;
              pixels[idx] = 0;       // R
              pixels[idx+1] = 255;   // G
              pixels[idx+2] = 0;     // B
              pixels[idx+3] = 255;   // A
            }
          }
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function escHtml(c) {
  if (c === '<') return '&lt;';
  if (c === '>') return '&gt;';
  if (c === '&') return '&amp;';
  return c;
}

function runLoop() {
  if (!emu) return;
  if (emu.is_running() && !emu.needs_key()) {
    emu.run(50000);
  }
  renderHRG();
  renderVDU();
  requestAnimationFrame(runLoop);
}

// Keyboard
display.addEventListener('keydown', (e) => {
  if (!emu) return;
  e.preventDefault();

  let ch = 0;
  if (e.key === 'Enter') ch = 0x0D;
  else if (e.key === 'Backspace') ch = 0x08;
  else if (e.key === 'Tab') ch = 0x09;
  else if (e.key === 'Escape') ch = 0x1B;
  else if (e.ctrlKey && e.key.length === 1) ch = e.key.toUpperCase().charCodeAt(0) & 0x1F;
  else if (e.key.length === 1) ch = e.key.charCodeAt(0);

  if (ch > 0 && ch < 128) {
    emu.key_press(ch);
  }
});

// File loading
loadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const data = new Uint8Array(await file.arrayBuffer());
  emu.load_com(data);
  status.textContent = `Loaded ${file.name} (${data.length} bytes)`;
  display.focus();
});

// HRG demo — draw some graphics to test the display
hrgDemoBtn.addEventListener('click', () => {
  if (!emu) return;
  emu.hrg_clear();
  emu.hrg_toggle(true);

  // Draw border
  for (let x = 0; x < HRG_W; x++) {
    emu.hrg_set_pixel(x, 0);
    emu.hrg_set_pixel(x, HRG_H - 1);
  }
  for (let y = 0; y < HRG_H; y++) {
    emu.hrg_set_pixel(0, y);
    emu.hrg_set_pixel(HRG_W - 1, y);
  }

  // Draw diagonals
  for (let i = 0; i < HRG_H; i++) {
    const x1 = Math.floor(i * HRG_W / HRG_H);
    emu.hrg_set_pixel(x1, i);
    emu.hrg_set_pixel(HRG_W - 1 - x1, i);
  }

  // Draw circle
  const cx = HRG_W / 2, cy = HRG_H / 2, r = 80;
  for (let a = 0; a < 360; a++) {
    const rad = a * Math.PI / 180;
    const x = Math.floor(cx + r * Math.cos(rad));
    const y = Math.floor(cy + r * Math.sin(rad));
    if (x >= 0 && x < HRG_W && y >= 0 && y < HRG_H) {
      emu.hrg_set_pixel(x, y);
    }
  }

  status.textContent = 'HRG demo: border, diagonals, circle (320×192)';
  display.focus();
});

start();
</script>
</body>
</html>
